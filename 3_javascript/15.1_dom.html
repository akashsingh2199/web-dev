<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom</title>
  </head>
  <body style="background-color: #212121; color: white">
    <div class="parent">
      <div class="day">mon</div>
      <div class="day">tue</div>
      <div class="day">wed</div>
      <div class="day">thu</div>
    </div>
  </body>
  <script>
    const parent = document.querySelector(".parent");
    console.log(parent);
    console.log(parent.children);
    console.log(parent.children[1].innerHTML);
    for (let i = 0; i < parent.children.length; i++) {
      console.log(parent.children[i].innerHTML);
    }
    parent.children[1].style.color = "red";
    parent.children[2].style.color = "blue";
    console.log(parent.firstElementChild.innerHTML);
    console.log(parent.lastElementChild.innerHTML);
    const dayone = document.querySelector(".day");
    console.log(dayone.innerHTML);
    console.log(dayone.parentElement.innerHTML);
    console.log(dayone.nextElementSibling.innerHTML);
    console.log("nodes:", parent.childNodes);
    //create
    const div = document.createElement("div");
    console.log(div);
    div.className = "main";
    div.id = Math.round(Math.random() * 10 + 1);
    div.setAttribute("title", "gentitle");
  </script>
</html>
