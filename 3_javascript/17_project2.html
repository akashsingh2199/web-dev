<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #9face6);
        margin: 0;
        padding: 0;
    }

    .container {
        width: 350px;
        margin: 80px auto;
        padding: 25px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        text-transform: capitalize;
        margin-bottom: 20px;
    }

    form p {
        margin: 15px 0;
        text-align: left;
    }

    label {
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #6c63ff;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        border: none;
        background: #6c63ff;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #5548d9;
    }

    #result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }

    #weight_guide {
        margin-top: 20px;
        padding: 10px;
        background: #f4f4f4;
        border-radius: 8px;
        text-align: left;
    }

    #weight_guide h3 {
        margin-bottom: 10px;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>bmi calculator</h1>
        <form >
            <p><label> height in cm:</label><input type="text" name="h" id="height"></p>
            <p><label> weight in kg:</label><input type="text" name="w" id="weight"></p>
            <button>calculate</button>
            <div id="result"></div>
            <div id="weight_guide">
                <h3>bmi weight guide</h3>
                <p>under weight less than 18.6</p>
                <p>normal range 18.6 and 24.9</p>
                <p>overweight more than 24.9 </p>
            </div>
        </form>
    </div>
</body>
<script>
    const form = document.querySelector("form");
    form.addEventListener('submit',function (e) {
        e.preventDefault();
        const height = parseInt(document.querySelector("#height").value)
        const weight = parseInt(document.querySelector('#weight').value)
        const result = document.querySelector('#result')
        if (height === "" || height<0||isNaN(height)) {
            result.innerHTML=`give valid input ${height}`;
        }
        else if (weight === "" || weight<0||isNaN(weight)) {
            result.innerHTML=`give valid input ${weight}`;
        }
        else {
            const bmi = (weight/((height*height)/10000)).toFixed(2);
            if (bmi <18.6 ) {
            result.innerHTML= `<span>${bmi} under weight </span>`}
            else if (bmi > 24.9) {
                result.innerHTML= `<span>${bmi} over weight </span>`
            }
            else {
                result.innerHTML= `<span>${bmi} normal weight </span>`
            }
        }
    })
</script>
</html>
