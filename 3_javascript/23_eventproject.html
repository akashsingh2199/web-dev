<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project</title>
</head>
<body>
    <h1>hlo</h1>
    <button id="start">start</button>
    <button id="stop">stop</button>
</body>
  <script>
    const randomcolor = ()=> {
        const hex = "0123456789ABCDEF"
        let color = "#"
        for (let i = 0;i < 6;i++) {
            color += hex[Math.floor((Math.random()*16))]
        }
        return color   
        }  
        let akash
    const startcolorchanging = ()=> {
         akash =setInterval(() => {document.body.style.backgroundColor = randomcolor()},1000)
         
         
    }
    const stopcolorchanging = ()=> {
        clearInterval(akash)
    }
    document.querySelector('#start').addEventListener('click',startcolorchanging)
    document.querySelector('#stop').addEventListener('click',stopcolorchanging)
  </script>  
</html>
