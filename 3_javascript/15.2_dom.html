<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body style="background-color: #212121; color: antiquewhite">
    <ul class="language">
      <li>javascript</li>
    </ul>
  </body>
  <script>
    function addLanguage(langname) {
      const li = document.createElement("li");
      li.innerHTML = `${langname}`;
      document.querySelector(".language").appendChild(li);
    }
    addLanguage("python");
    addLanguage("cpp");

    function addoptimizelang(langname) {
      //its most optimize way as compair to 1st one
      const li = document.createElement("li");
      li.appendChild(document.createTextNode(langname));
      document.querySelector(".language").appendChild(li);
    }
    addoptimizelang("java");

    //edit
    const scndlang = document.querySelector("li:nth-child(2)")
    //scndlang.innerHTML="c" //easy but unoptmiz way
    //scndlang.outerHTML = "<li>c</li>" //another way
    const newli = document.createElement("li")
    newli.textContent="c"
    scndlang.replaceWith(newli) //most used way
    const lastlang = document.querySelector("li:last-child")
    lastlang.remove()
    //remove

  </script>
</html>
