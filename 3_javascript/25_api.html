<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>api</title>
</head>
<body>
    <img src="https://avatars.githubusercontent.com/u/11613311?v=4" alt="no pic">
    <p id = 'f'></p>
</body>
<script>
    const requesturl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest();
    xhr.open('GET',requesturl)
    xhr.onreadystatechange=function() {
        console.log(xhr.readyState);
        if (xhr.readyState===4) {
            console.log(this.responseText);
            const data= JSON.parse(this.responseText)//api come in string most of the type 
            console.log(data.followers);
            document.querySelector('#f').innerHTML=` follower = ${data.followers}`
        }        
    }
    
    xhr.send()
</script>
</html>
