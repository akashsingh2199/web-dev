<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            color: rgb(0, 0, 0);
        }
        th,td {
            border: 1px solid black;
            padding: 10px;
        }
        tr:nth-child(odd)  {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>akash</th>
            <th>goli</th>
            <th>alka</th>
            <th>akshit</th>
        </tr>
        <tr>
            <td>akash</td>
            <td>goli</td>
            <td>alka</td>
            <td>akshat</td>
        </tr>
         <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
         </tr>
         <tr>
            <td>5</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
         </tr>
    </table>

</body>
</html>
